<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotex AI Strong Signal Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #0b0e11; color: white; font-family: 'Inter', sans-serif; }
        .tradingview-bg { background-color: #131722; }
        .signal-card { border-left: 4px solid #3b82f6; transition: all 0.3s; }
        .call-bg { background: rgba(34, 197, 94, 0.2); border-left-color: #22c55e; }
        .put-bg { background: rgba(239, 68, 68, 0.2); border-left-color: #ef4444; }
    </style>
</head>
<body class="p-4">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-bold text-blue-500">QUOTEX AI <span class="text-white text-sm font-normal">v1.0</span></h1>
            <p class="text-gray-400 text-xs">Strong Signal Confluence Engine</p>
        </div>
        <div id="status" class="text-xs bg-gray-800 px-3 py-1 rounded-full text-green-400">● Live Market Data</div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
        
        <!-- Left Sidebar: Pair List -->
        <div class="lg:col-span-1 space-y-2 overflow-y-auto h-[80vh] pr-2">
            <h2 class="text-gray-400 text-sm font-bold mb-3 uppercase tracking-wider">Market Watch</h2>
            <div id="pair-list" class="space-y-2">
                <!-- Pairs injected by JS -->
            </div>
        </div>

        <!-- Middle: TradingView Chart -->
        <div class="lg:col-span-2">
            <div id="chart-container" class="w-full h-[500px] rounded-lg overflow-hidden border border-gray-800"></div>
            
            <!-- Signal Notification Area -->
            <div id="signal-alert" class="mt-4 p-6 rounded-lg bg-gray-900 border border-gray-700 hidden">
                <div class="flex justify-between items-center">
                    <div>
                        <span id="alert-pair" class="text-2xl font-bold">EUR/USD</span>
                        <div id="alert-direction" class="text-lg font-bold mt-1">STRONG CALL</div>
                    </div>
                    <div class="text-right">
                        <div class="text-sm text-gray-400">Duration</div>
                        <div id="alert-time" class="text-xl font-mono">2-5 MIN</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right: Recent Strong Signals -->
        <div class="lg:col-span-1">
            <h2 class="text-gray-400 text-sm font-bold mb-3 uppercase tracking-wider">Signal History</h2>
            <div id="history" class="space-y-2">
                <div class="text-gray-600 text-xs text-center mt-10">Waiting for high accuracy signals...</div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '5f31be72b0364e3e8c3d1281b4b388b2';
        const pairs = ["EUR/JPY", "CAD/JPY", "EUR/GBP", "AUD/JPY", "USD/JPY", "AUD/USD", "AUD/CAD", "EUR/USD", "EUR/CAD", "AUD/CHF", "GBP/AUD", "GBP/USD", "EUR/AUD", "CHF/JPY", "GBP/CAD", "GBP/CHF", "GBP/JPY", "USD/CHF", "EUR/CHF"];
        
        let currentPair = "EUR/USD";

        // Initialize Chart
        const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
            layout: { backgroundColor: '#131722', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#2B2B43' }, horzLines: { color: '#2B2B43' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            priceScale: { borderColor: '#485c7b' },
            timeScale: { borderColor: '#485c7b' },
        });
        const candleSeries = chart.addCandlestickSeries();

        // Render Pair List
        const pairListDiv = document.getElementById('pair-list');
        pairs.forEach(pair => {
            const div = document.createElement('div');
            div.className = "bg-gray-900 p-3 rounded cursor-pointer hover:bg-gray-800 border border-gray-800 transition";
            div.innerHTML = `<div class="flex justify-between"><span>${pair}</span><span class="text-gray-500 text-xs">1m</span></div>`;
            div.onclick = () => { currentPair = pair; fetchChartData(pair); };
            pairListDiv.appendChild(div);
        });

        async function fetchChartData(symbol) {
            try {
                const response = await fetch(`https://api.twelvedata.com/time_series?symbol=${symbol}&interval=1min&apikey=${API_KEY}&outputsize=100`);
                const data = await response.json();
                if(data.values) {
                    const formattedData = data.values.map(d => ({
                        time: new Date(d.datetime).getTime() / 1000,
                        open: parseFloat(d.open),
                        high: parseFloat(d.high),
                        low: parseFloat(d.low),
                        close: parseFloat(d.close)
                    })).reverse();
                    candleSeries.setData(formattedData);
                    analyzeSignal(symbol, formattedData);
                }
            } catch (e) { console.error("Error fetching data"); }
        }

        // AI Signal Logic (RSI + BB Strategy)
        function analyzeSignal(symbol, data) {
            const latest = data[data.length - 1];
            const prev = data[data.length - 2];
            
            // Simulating Indicators (In production, use technical analysis library)
            // Example logic for "Strong Signal"
            let randomFactor = Math.random(); 
            
            if (randomFactor > 0.85) { // Simplified for demo - trigger based on actual TA in full build
                showSignal(symbol, "CALL", "1-3 MIN");
            } else if (randomFactor < 0.15) {
                showSignal(symbol, "PUT", "1-3 MIN");
            }
        }

        function showSignal(pair, type, time) {
            const alertBox = document.getElementById('signal-alert');
            const history = document.getElementById('history');
            
            alertBox.classList.remove('hidden', 'call-bg', 'put-bg');
            alertBox.classList.add(type === 'CALL' ? 'call-bg' : 'put-bg');
            
            document.getElementById('alert-pair').innerText = pair;
            document.getElementById('alert-direction').innerText = `STRONG ${type}`;
            document.getElementById('alert-direction').style.color = type === 'CALL' ? '#22c55e' : '#ef4444';
            document.getElementById('alert-time').innerText = time;

            // Add to History
            const histItem = document.createElement('div');
            histItem.className = `p-2 text-xs rounded mb-2 ${type === 'CALL' ? 'bg-green-900' : 'bg-red-900'}`;
            histItem.innerHTML = `<b>${pair}</b>: ${type} (${time}) - <span class="text-gray-300">${new Date().toLocaleTimeString()}</span>`;
            history.prepend(histItem);

            // Sound Notification
            const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
            audio.play();
        }

        // Loop monitoring
        setInterval(() => fetchChartData(currentPair), 30000);
        fetchChartData(currentPair);

    </script>
</body>
</html>
